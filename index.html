<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thermal POS Pro</title>

<style>
body{
background:
linear-gradient(
135deg,
#0f172a 0%,
#1e1b4b 35%,
#312e81 70%,
#4f46e5 100%
);
display:flex;
justify-content:center;
align-items:center;
gap:25px;
padding:25px;
flex-wrap:wrap;
font-family:'Segoe UI',sans-serif;
min-height:100vh;
}

.panel{
width:350px;
background:rgba(255,255,255,.88);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
padding:24px;
border-radius:30px;
border:1px solid rgba(255,255,255,.25);

box-shadow:
0 30px 80px rgba(0,0,0,.25),
0 10px 30px rgba(99,102,241,.15);

transition:.3s;
}

.panel input,
.panel textarea{

width:100%;
padding:14px 16px;
margin:7px 0;

background:#f8fafc;

border:2px solid #e2e8f0;

border-radius:16px;

font-size:14px;

transition:.25s;

box-sizing:border-box;

}
width:100%;
padding:12px 14px;
margin:6px 0;
border:2px solid #e5e7eb;
border-radius:12px;
font-size:14px;
font-family:inherit;
outline:none;
transition:.25s;
box-sizing:border-box;
}

.panel input:focus,
.panel textarea:focus{

border-color:#8b5cf6;

box-shadow:
0 0 0 5px rgba(139,92,246,.15),
0 10px 25px rgba(139,92,246,.15);

transform:translateY(-1px);

}

.panel button{

width:100%;

padding:15px;

margin-top:10px;

border:none;

border-radius:18px;

cursor:pointer;

font-weight:700;

font-size:14px;

letter-spacing:.5px;

background:
linear-gradient(
135deg,
#6366f1,
#8b5cf6,
#a855f7
);

color:#fff;

box-shadow:
0 15px 35px rgba(139,92,246,.35);

transition:.3s;

}

.panel button:hover{

transform:
translateY(-3px)
scale(1.02);

box-shadow:
0 20px 40px rgba(139,92,246,.45);

}

.receipt{

width:80mm;
max-width:80mm;

background:#ffffff;

padding:6mm 4mm;

border-radius:30px;

box-shadow:
0 30px 80px rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.4);

}

@media print{
body{
background:#fff;
}

.panel{
display:none;
}

/* 🔥 paksa ukuran kertas thermal */
@page {
size: 80mm auto;
margin: 0;
}

.receipt{
width: 80mm;
max-width: 80mm;
padding: 0;
}
}

#out{
font-size:12px;
line-height:1.2;
white-space:pre-wrap;
font-family:monospace;
margin:0;
}

@media print{
.panel{display:none}
body{background:#fff}
}

#subtotal,
#service,
#tax,
#total,
#change{
display:none;
}

@media print{
pre{
font-size:12px;
line-height:1.2;
white-space:pre;
}

pre::after{
content:"";
}
}

/* 🔥 trick highlight TOTAL */
#out{
white-space:pre;
}

.total-bold{
font-weight:900;
font-size:16px;
color:#000;
}

#out{
white-space:pre;
}

t{
display:block;
font-size:18px;
font-weight:900;
color:#000;
}

.tbl-bold{
font-size:18px;
font-weight:900;
color:#000;
}

.login-page{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0f172a,
#1e293b,
#334155
);
z-index:9999;
}

.login-box{

width:380px;

background:rgba(255,255,255,.88);

backdrop-filter:blur(25px);

padding:35px;

border-radius:35px;

border:1px solid rgba(255,255,255,.25);

box-shadow:
0 35px 80px rgba(0,0,0,.35);

}

.login-box h1{
text-align:center;
margin-bottom:20px;
font-size:28px;
font-weight:900;
color:#111827;
}

.login-box input{
width:100%;
padding:14px;
margin-bottom:12px;
border:2px solid #ddd;
border-radius:12px;
box-sizing:border-box;
text-align:center;
font-size:16px;
font-weight:600;
}

.login-box input::placeholder{
text-align:center;
}

.login-box button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
background:linear-gradient(
135deg,
#6366f1,
#8b5cf6
);
color:white;
}

.panel,
.login-box{

position:relative;
overflow:hidden;

}

.panel::before,
.login-box::before{

content:"";

position:absolute;

width:250px;
height:250px;

background:
radial-gradient(
circle,
rgba(139,92,246,.20),
transparent 70%
);

top:-120px;
right:-120px;

pointer-events:none;

}

</style>
</head>

<body>

<div id="loginPage" class="login-page">

<div class="login-box">

<h1>THERMAL POS PRO</h1>

<input id="username" placeholder="Username">

<input id="password"
type="password"
placeholder="Password">

<button onclick="login()">
LOGIN
</button>

</div>

</div>

<div class="panel" id="appPanel" style="display:none;">
<h3 style="
text-align:center;
margin-bottom:15px;
font-size:22px;
font-weight:800;
color:#111827;
">
THERMAL POS PRO
</h3>

<input id="store" placeholder="Nama Toko" style="text-align:center;">
<input id="branch" placeholder="Alamat">
<input id="cashier" placeholder="Cashier">
<input id="server" placeholder="Server">
<input id="pax" placeholder="PAX">
<input id="table" placeholder="TBL">
<input id="date" placeholder="Tanggal / Jam">

<h4>ITEM (format: qty nama harga)</h4>
<textarea id="items" rows="8" placeholder="1 Nasi Goreng @25000
2 Es Teh @10000"></textarea>

<input id="subtotal" placeholder="Subtotal">
<input id="service" placeholder="Service Charge">
<input id="tax" placeholder="PB1 / Pajak">
<input id="total" placeholder="TOTAL">
<input id="cash" placeholder="CASH">
<input id="change" placeholder="CHANGE">

<input id="customerCare" placeholder="Customer Care">
<input id="instagram" placeholder="Instagram">

<button onclick="render()">GENERATE</button>
<button onclick="window.print()">PRINT</button>
<button onclick="logout()">
LOGOUT
</button>
</div>

<div class="receipt" id="receiptBox" style="display:none;">
<div id="out"></div>
</div>

<script>

function padLeft(str,len){
return (" ".repeat(len) + str).slice(-len);
}

function formatIDR(num){
return num.toLocaleString("id-ID");
}

function render(){

let store = document.getElementById("store").value || "NAMA TOKO";
let branch = document.getElementById("branch").value || "ALAMAT TOKO";
let cashier = document.getElementById("cashier").value || "CASHIER";
let server = document.getElementById("server").value || "SERVER";
let pax = document.getElementById("pax").value || "1";
let table = document.getElementById("table").value || "TBL 01";
let date = document.getElementById("date").value || new Date().toLocaleString();

let itemsRaw = document.getElementById("items").value.trim();

let cash = parseInt(document.getElementById("cash").value || 0);
let changeInput = document.getElementById("change").value;

let customerCare =
document.getElementById("customerCare").value ||
"080000xxxxxxxx";

let instagram =
document.getElementById("instagram").value ||
"Instagram";

// garis pembatas thermal lebih panjang
let line = "-".repeat(48);

let text = "";

text += '<div style="text-align:center;font-size:18px;font-weight:900;">' + store + '</div>';
text += padLeft(branch,28) + "\n\n";

text += "POS: Cashier                  Cashier: " + cashier + "\n";
text += line + "\n";

text += "                              Server: " + server + "\n";
text += date + "              PAX: " + pax + "\n";
text += '<div class="tbl-bold">' + table + '</div>\n';
text += line + "\n";

// =====================
// ITEM AUTO HITUNG
// =====================
let lines = itemsRaw.split("\n");
let totalQty = 0;
let subtotal = 0;

lines.forEach(l => {
if(!l.trim()) return;

// FORMAT: 3 Teh Obenk @5000
let parts = l.trim().split(" ");

let qty = parseInt(parts[0]) || 0;
let priceRaw = parts.find(p => p.includes("@")) || parts[parts.length-1];
let price = parseInt(priceRaw.replace("@","")) || 0;

let name = parts.slice(1).filter(p => !p.includes("@")).join(" ");

// hitung
let totalHarga = qty * price;

totalQty += qty;
subtotal += totalHarga;

// format item (TETAP + ALIGN RAPIH)
let itemText = qty + " " + name + " @" + price;

// bikin jarak tetap konsisten sebelum total
let space = 39 - itemText.length;
if(space < 1) space = 1;

text += itemText + " ".repeat(space) + formatIDR(totalHarga) + "\n";
});

// =====================
// AUTO CALC SUMMARY
// =====================

let service = Math.round(subtotal * 0.05); // 5%
let tax = Math.round(subtotal * 0.1);      // 10%
let total = subtotal + service + tax;

// auto change kalau cash diisi
let change = cash > 0 ? (cash - total) : 0;

text += "\n";

text += "Total Item : " + lines.length + "                   Total Qty : " + totalQty + "\n\n";

let labelWidth = 32; // lebar kiri label
let valueWidth = 12; // lebar angka kanan

function lineRow(label, value){
let left = label.padEnd(labelWidth, " ");
let right = formatIDR(value).toString();
let space = 47 - left.length - right.length;
if(space < 1) space = 1;
return left + " ".repeat(space) + right + "\n";
}

text += "\n";

text += lineRow("Subtotal", subtotal);
text += lineRow("Service (5%)", service);
text += lineRow("PB1 (10%)", tax);

text += "\n";

text += "<t>" + "TOTAL@@@" + formatIDR(total) + "</t>\n";
text += lineRow("CASH", cash);
text += lineRow("CHANGE", change);

text += line + "\n";

text += '<div style="text-align:center;margin:2px 0;">';
text += 'Closed ' + date;
text += '</div>';

text += line + "\n";

text += '<div style="text-align:center;margin-top:4px;">';
text += 'Terima Kasih<br>';
text += 'Customer Care : ' + customerCare + '<br>';
text += 'IG : ' + instagram;
text += '</div>';

// 🔥 FIX TOTAL STYLE
text = text.replace(
"TOTAL@@@" + formatIDR(total),
"TOTAL " + " ".repeat(15) + formatIDR(total)
);

document.getElementById("out").innerHTML = text;

}

render();

function login(){

let user =
document.getElementById("username").value;

let pass =
document.getElementById("password").value;

if(user==="boit" && pass==="win29400"){

document.getElementById("loginPage").style.display="none";

document.getElementById("appPanel").style.display="block";

document.getElementById("receiptBox").style.display="block";

}else{

alert("Username atau Password Salah");

}

}

function logout(){

document.getElementById("loginPage").style.display="flex";

document.getElementById("appPanel").style.display="none";

document.getElementById("receiptBox").style.display="none";

}

/* ===== ANTI INSPECT ===== */

document.addEventListener('contextmenu', function(e){
    e.preventDefault();
});

document.onkeydown = function(e){

    // F12
    if(e.keyCode == 123){
        return false;
    }

    // CTRL + SHIFT + I
    if(e.ctrlKey && e.shiftKey && e.keyCode == 73){
        return false;
    }

    // CTRL + SHIFT + J
    if(e.ctrlKey && e.shiftKey && e.keyCode == 74){
        return false;
    }

    // CTRL + U
    if(e.ctrlKey && e.keyCode == 85){
        return false;
    }

    // CTRL + SHIFT + C
    if(e.ctrlKey && e.shiftKey && e.keyCode == 67){
        return false;
    }

};


document.onselectstart = function(e){

    if(e.target.closest("#listKantong")){
        return true;
    }

    return false;
};


(function(){

function detectDevTools(){

    const start = new Date();

    debugger;

    const end = new Date();

    if(end - start > 100){

        document.body.innerHTML =
        "<h1 style='color:red;text-align:center;margin-top:100px;'>SECURITY BLOCKED</h1>";

    }

}

setInterval(detectDevTools,1000);

})();

</script>

</body>
</html>
